<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stinger">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<title>Stinger Chemical</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--bg4:#21262d;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --accent:#e53e3e;--accent-dim:rgba(229,62,62,0.12);
  --red:#f87171;--red-dim:rgba(248,113,113,0.12);
}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
input,select{font-family:inherit;font-size:13px;color:var(--text);background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;outline:none;width:100%;transition:border-color .15s;}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
select option{background:var(--bg3);}
button{font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* PIN */
#pin-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;gap:20px;}
#pin-screen.hidden{display:none;}
.pin-dots{display:flex;gap:16px;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);}
.pin-dot.error{background:var(--red);border-color:var(--red);}
.pin-keypad{display:grid;grid-template-columns:repeat(3,72px);gap:10px;}
.pin-key{width:72px;height:72px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:22px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;}
.pin-key:active,.pin-key:hover{background:var(--bg4);}
.pin-key.empty{background:transparent;border:none;cursor:default;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.shake{animation:shake .4s ease;}

/* 앱 레이아웃 */
#app{display:flex;height:100vh;overflow:hidden;}
#app.hidden{display:none;}
#sidebar{width:242px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 13px;gap:14px;overflow-y:auto;flex-shrink:0;transition:width .25s,padding .25s;z-index:50;}
#sidebar.closed{width:0;padding:0;overflow:hidden;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#header{display:flex;align-items:center;padding:9px 10px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:6px;flex-wrap:nowrap;}
.hdr-left{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.hdr-right{display:flex;align-items:center;gap:3px;margin-left:auto;flex-shrink:0;}
.view-tabs{display:flex;gap:2px;background:var(--bg3);border-radius:8px;padding:3px;flex-shrink:0;}
.view-tab{padding:5px 10px;font-size:11px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;white-space:nowrap;}
.view-tab.active{background:var(--bg2);color:var(--text);font-weight:600;}

/* 캘린더 공통 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-header-row{background:var(--bg2);border-bottom:1px solid var(--border);}
.cal-cell{background:var(--bg);padding:5px 6px;min-height:85px;}
.cal-cell.other-month{background:var(--bg2);opacity:.38;}
.cal-cell.drag-over,.week-col.drag-over,.tl-slot.drag-over{background:rgba(229,62,62,0.12)!important;outline:2px dashed #e53e3e;}
.apt-chip{font-size:10px;padding:2px 5px;margin-bottom:1px;border-radius:3px;cursor:grab;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:16px;user-select:none;}

/* 타임라인 뷰 (주간/일간) */
#tl-view{flex:1;overflow:auto;position:relative;}
.tl-wrap{display:flex;min-height:100%;}
.tl-time-col{width:52px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);position:sticky;left:0;z-index:3;}
.tl-time-slot{height:30px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 4px;font-size:10px;color:var(--text3);}
.tl-time-slot.half{height:30px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0;}
.tl-days{display:flex;flex:1;}
.tl-day-col{flex:1;min-width:80px;border-right:1px solid var(--border);position:relative;}
.tl-day-hdr{height:46px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;position:sticky;top:0;z-index:2;}
.tl-day-body{position:relative;}
.tl-slot{height:30px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background .1s;}
.tl-slot:hover{background:rgba(255,255,255,0.03);}
.tl-slot-hl{background:rgba(229,62,62,0.2)!important;outline:1px dashed var(--accent);}
.tl-slot.hour-border{border-bottom:1px solid var(--border);}
.tl-apt{position:absolute;left:3px;right:3px;border-radius:5px;padding:4px 6px;cursor:pointer;overflow:hidden;z-index:1;transition:opacity .1s;}
.tl-apt:hover{opacity:.8;}
.tl-apt.dragging{opacity:.4;}
.tl-hdr-wrap{position:sticky;top:0;z-index:4;display:flex;background:var(--bg2);}

/* 모달 */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px;}
#modal-box{background:var(--bg2);border-radius:14px;padding:20px 20px 16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;border:1px solid var(--border2);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-field label{font-size:10px;color:var(--text2);display:block;margin-bottom:4px;letter-spacing:.04em;}
.form-field.span2{grid-column:1/-1;}
.sugg-wrap{position:relative;}
.sugg-list{position:absolute;top:calc(100% + 3px);left:0;right:0;z-index:300;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;max-height:170px;overflow-y:auto;box-shadow:0 12px 28px rgba(0,0,0,.55);}
.sugg-item{padding:9px 12px;font-size:13px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border);}
.sugg-item:hover{background:var(--bg4);}
.pay-btn{flex:1;padding:8px 0;font-size:13px;font-weight:600;border-radius:7px;cursor:pointer;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .15s;}
.work-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.work-tag{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s;user-select:none;}
.work-tag:hover{border-color:var(--accent);color:var(--accent);}
.work-tag.sel{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600;}
.work-add-row{display:flex;gap:6px;margin-top:4px;}
.work-add-row input{flex:1;}
.work-add-btn{padding:0 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:12px;white-space:nowrap;cursor:pointer;}
.work-add-btn:hover{border-color:var(--accent);color:var(--accent);}
@media(max-width:768px){#sidebar{position:fixed;top:0;left:0;height:100vh;}#overlay{display:block;}}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;}
</style>
</head>

      <div class="form-field"><label>차량번호</label><input id="f-plate" placeholder="12가 3456"></div>

        <div class="work-add-row">
          <input id="f-work-new" placeholder="새 항목 직접 입력 후 추가" onkeydown="if(event.key==='Enter'){event.preventDefault();addWorkTag();}">
          <button class="work-add-btn" onclick="addWorkTag()">+ 추가</button>

        <div style="margin-top:5px;font-size:11px;color:var(--text3);">선택: <span id="work-preview" style="color:var(--text2);">없음</span></div>

      <div class="form-field span2"><label>금액 (원)</label><div style="position:relative;"><span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:13px;pointer-events:none;">₩</span><input id="f-amt" type="number" inputmode="numeric" placeholder="150000" style="padding-left:24px;"></div></div>

        <button class="pay-btn" id="pay-이체" onclick="selectPay('이체')">이체</button>

      <button id="del-btn" onclick="handleDelete()" style="display:none;padding:7px 12px;font-size:12px;font-weight:600;border-radius:7px;margin-right:auto;background:transparent;color:var(--red);border:1px solid var(--red);">삭제</button>
      <button onclick="closeModal()" style="padding:7px 14px;font-size:13px;font-weight:500;border-radius:7px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);">취소</button>
      <button id="save-btn" onclick="handleSave()" style="padding:7px 22px;font-size:13px;font-weight:700;border-radius:7px;background:var(--accent);border:none;color:#fff;">예약 등록</button>
    </div>
  </div>

<script>
firebase.initializeApp({apiKey:"AIzaSyAN7sReKaMVAXjwFHdfzsAQk3saBkxu3Zw",authDomain:"stinger-v02.firebaseapp.com",projectId:"stinger-v02",storageBucket:"stinger-v02.firebasestorage.app",messagingSenderId:"649911606282",appId:"1:649911606282:web:ec8b0a1edccab2f848d3f3"});
const db=firebase.firestore();

// PIN
const CORRECT_PIN='0070';
let pinEntry='';
function pinInput(n){if(pinEntry.length>=4)return;pinEntry+=n;updateDots();if(pinEntry.length===4)setTimeout(checkPin,80);}
function pinDel(){pinEntry=pinEntry.slice(0,-1);updateDots();document.getElementById('pin-err').textContent='';}
function updateDots(){for(let i=0;i<4;i++){const d=document.getElementById('dot'+i);d.classList.toggle('filled',i<pinEntry.length);d.classList.remove('error');}}
function checkPin(){
  if(pinEntry===CORRECT_PIN){document.getElementById('pin-screen').classList.add('hidden');document.getElementById('app').classList.remove('hidden');initApp();}
  else{for(let i=0;i<4;i++)document.getElementById('dot'+i).classList.add('error');document.getElementById('pin-err').textContent='PIN이 올바르지 않습니다';document.getElementById('pin-dots').classList.add('shake');setTimeout(()=>{pinEntry='';updateDots();document.getElementById('pin-dots').classList.remove('shake');},500);}
}

// 상태
const DEFAULT_WORK_ITEMS=["세차", "광택", "유리막코팅", "낙진제거", "실내크리닝", "냄새제거", "PPF 시공", "보험처리", "덴트복원", "도색", "신차패키지"];
let apts=[],sugg={carTypes:[],workItems:[...DEFAULT_WORK_ITEMS]};
let curDate=new Date(),calView='월간',revPeriod='월간';
let editId=null,delConfirm=false,selectedPay='카드',sidebarOpen=window.innerWidth>768,dragId=null;
let selectedWorkTags=[];


const PAY_COLOR={'카드':'#60a5fa','이체':'#fbbf24','현금':'#4ade80'};
const PAY_DIM={'카드':'rgba(96,165,250,.14)','이체':'rgba(251,191,36,.14)','현금':'rgba(74,222,128,.14)'};
const WEEK_SUN=['일','월','화','수','목','금','토'];
const TL_START=8,TL_END=20,SLOT_H=30,APT_DURATION=2;

function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmt(n){return Number(n||0).toLocaleString('ko-KR');}
function fmtTime(v){let d=v.replace(/\D/g,'');if(d.length>4)d=d.slice(0,4);return d.length>=3?d.slice(0,2)+':'+d.slice(2):d;}
function weekStart(date){const d=new Date(date);d.setDate(d.getDate()-d.getDay());d.setHours(0,0,0,0);return d;}
function weekDays(date){const s=weekStart(date);return Array.from({length:7},(_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d;});}
function todayStr(){return ds(new Date());}
function setSyncStatus(s){const dot=document.getElementById('sync-dot');if(dot)dot.style.background=s==='synced'?'#4ade80':s==='syncing'?'#fbbf24':'#f87171';}

// 시간 → 슬롯 위치 계산 (08:00 = 0, 30분 = 1슬롯 = 30px)
function timeToY(timeStr){
  if(!timeStr) return 0;
  const parts=timeStr.split(':');
  const h=parseInt(parts[0])||0, m=parseInt(parts[1])||0;
  const totalMin=(h*60+m)-(TL_START*60);
  return Math.max(0, totalMin/30*SLOT_H);
}
function timeToSlotClick(slotIdx){
  const totalMin=slotIdx*30+TL_START*60;
  const h=Math.floor(totalMin/60), m=totalMin%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}
const TL_TOTAL_SLOTS=(TL_END-TL_START)*2; // 24슬롯
const TL_BODY_H=TL_TOTAL_SLOTS*SLOT_H; // 720px

function initApp(){
  if(!sidebarOpen) document.getElementById('sidebar').classList.add('closed');
  db.collection('appointments').onSnapshot(snap=>{apts=snap.docs.map(d=>({id:d.id,...d.data()}));setSyncStatus('synced');render();},()=>setSyncStatus('offline'));
  db.collection('settings').doc('suggestions').onSnapshot(snap=>{if(snap.exists){const d=snap.data();sugg={...d,workItems:d.workItems&&d.workItems.length?d.workItems:[...DEFAULT_WORK_ITEMS]};}});
  window.addEventListener('resize',()=>{if(window.innerWidth>768){document.getElementById('overlay').style.display='none';if(!sidebarOpen){sidebarOpen=true;document.getElementById('sidebar').classList.remove('closed');}}});
  render();
}

function toggleSidebar(){sidebarOpen=!sidebarOpen;document.getElementById('sidebar').classList.toggle('closed',!sidebarOpen);if(window.innerWidth<=768)document.getElementById('overlay').style.display=sidebarOpen?'block':'none';}
function navigate(dir){if(calView==='월간')curDate=new Date(curDate.getFullYear(),curDate.getMonth()+dir,1);else if(calView==='주간'){const d=new Date(curDate);d.setDate(d.getDate()+dir*7);curDate=d;}else{const d=new Date(curDate);d.setDate(d.getDate()+dir);curDate=d;}render();}
function goToday(){curDate=new Date();render();}
function headerLabel(){const y=curDate.getFullYear(),m=curDate.getMonth();if(calView==='월간')return`${y}년 ${m+1}월`;if(calView==='주간'){const wd=weekDays(curDate),f=wd[0],l=wd[6];return f.getMonth()===l.getMonth()?`${y}년 ${m+1}월 ${f.getDate()}~${l.getDate()}일`:`${f.getMonth()+1}/${f.getDate()} ~ ${l.getMonth()+1}/${l.getDate()}`;}return`${y}.${String(m+1).padStart(2,'0')}.${String(curDate.getDate()).padStart(2,'0')}`;}
function setCalView(v,btn){calView=v;document.querySelectorAll('#header .view-tab').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');render();}
function setRevPeriod(v,btn){revPeriod=v;document.querySelectorAll('#sidebar .view-tab').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');renderSidebar();}

function calcRev(){
  const refDate=curDate;let list=apts;
  if(revPeriod==='일별')list=apts.filter(a=>a.date===ds(refDate));
  else if(revPeriod==='주간'){const wd=weekDays(refDate),s=ds(wd[0]),e=ds(wd[6]);list=apts.filter(a=>a.date>=s&&a.date<=e);}
  else{const pfx=refDate.getFullYear()+'-'+String(refDate.getMonth()+1).padStart(2,'0');list=apts.filter(a=>a.date.startsWith(pfx));}
  const total=list.reduce((s,a)=>s+Number(a.amount||0),0);
  const byM={카드:0,이체:0,현금:0};
  list.forEach(a=>{if(byM[a.paymentMethod]!==undefined)byM[a.paymentMethod]+=Number(a.amount||0);});
  return{total,byM,count:list.length};
}

function renderSidebar(){
  const{total,byM,count}=calcRev();
  const labels={'월간':`${curDate.getFullYear()}년 ${curDate.getMonth()+1}월 매출`,'주간':`${curDate.getFullYear()}년 ${curDate.getMonth()+1}월 ${Math.ceil(curDate.getDate()/7)}주차 매출`,'일별':`${curDate.getMonth()+1}/${curDate.getDate()} 매출`};
  document.getElementById('rev-label').textContent=labels[revPeriod]||'매출';
  document.getElementById('rev-total').textContent='₩'+fmt(total);
  document.getElementById('rev-count').textContent=count+'건 예약';
  document.getElementById('pay-breakdown').innerHTML=['카드','이체','현금'].map(m=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 9px;margin-bottom:3px;border-radius:7px;border:1px solid var(--border);background:${byM[m]>0?PAY_DIM[m]:'var(--bg3)'}"><div style="display:flex;align-items:center;gap:7px;"><div style="width:7px;height:7px;border-radius:50%;background:${PAY_COLOR[m]};"></div><span style="font-size:12px;color:var(--text2);">${m}</span></div><span style="font-size:12px;font-weight:600;color:${byM[m]>0?PAY_COLOR[m]:'var(--text3)'};">₩${fmt(byM[m])}</span></div>`).join('');
  const ta=apts.filter(a=>a.date===ds(new Date())).sort((a,b)=>a.reservationTime.localeCompare(b.reservationTime));
  document.getElementById('today-list').innerHTML=!ta.length?'<div style="font-size:11px;color:var(--text3);text-align:center;padding:12px 0;">예약 없음</div>':ta.map(a=>`<div onclick="openEdit('${a.id}')" style="padding:7px 9px;margin-bottom:3px;border-radius:7px;cursor:pointer;background:var(--bg3);border:1px solid var(--border);border-left:3px solid ${PAY_COLOR[a.paymentMethod]};" onmouseover="this.style.background='var(--bg4)'" onmouseout="this.style.background='var(--bg3)'"><div style="font-size:11px;font-weight:600;color:var(--text);">${a.reservationTime||''} ${a.customerName||''}</div><div style="font-size:10px;color:var(--text2);">${a.carType||''}${a.licensePlate?' · '+a.licensePlate:''}</div><div style="font-size:10px;color:${PAY_COLOR[a.paymentMethod]};font-weight:600;">₩${fmt(a.amount)} · ${a.paymentMethod}</div></div>`).join('');
}

// ── 월간 뷰 ───────────────────────────────────────────────────
function renderMonth(){
  const y=curDate.getFullYear(),m=curDate.getMonth();
  const dim=new Date(y,m+1,0).getDate(),fd=new Date(y,m,1).getDay(),prev=new Date(y,m,0).getDate();
  let cells=[];
  for(let i=fd-1;i>=0;i--) cells.push({day:prev-i,cur:false,date:new Date(y,m-1,prev-i)});
  for(let i=1;i<=dim;i++) cells.push({day:i,cur:true,date:new Date(y,m,i)});
  while(cells.length%7!==0) cells.push({day:cells.length-dim-fd+1,cur:false,date:new Date(y,m+1,cells.length-dim-fd+1)});
  const rows=cells.length/7;
  // 요일헤더+날짜셀을 단일 grid로 통합 → 폭이 항상 일치
  let html=`<div class="cal-grid" style="display:grid;grid-template-rows:auto repeat(${rows},1fr);flex:1;background:var(--border);gap:1px;">`;
  WEEK_SUN.forEach((d,i)=>{html+=`<div style="text-align:center;padding:7px 0;font-size:12px;font-weight:600;color:${i===0?'#f87171':i===6?'#60a5fa':'var(--text3)'};background:var(--bg2);position:sticky;top:0;z-index:2;">${d}</div>`;});;
  cells.forEach((cell,idx)=>{
    const dow=idx%7,isT=ds(cell.date)===todayStr(),dStr=ds(cell.date);
    const da=apts.filter(a=>a.date===dStr).sort((a,b)=>a.reservationTime.localeCompare(b.reservationTime));
    html+=`<div class="cal-cell${cell.cur?'':' other-month'}" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="handleDrop(event,'${dStr}')">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">
        <div style="width:22px;height:22px;border-radius:50%;background:${isT?'var(--accent)':'transparent'};color:${isT?'#fff':dow===0?'#f87171':dow===6?'#60a5fa':'var(--text2)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:${isT?700:400};">${cell.day}</div>
        ${cell.cur?`<button onclick="openAdd('${dStr}',null)" style="width:18px;height:18px;border-radius:50%;background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center;padding:0;" onmouseover="this.style.background='var(--accent)';this.style.color='#fff'" onmouseout="this.style.background='transparent';this.style.color='var(--text2)'">+</button>`:''}
      </div>`;
    da.forEach(a=>{html+=`<div class="apt-chip" draggable="true" style="background:${PAY_DIM[a.paymentMethod]};border-left:2px solid ${PAY_COLOR[a.paymentMethod]};" ondragstart="dragId='${a.id}';event.dataTransfer.effectAllowed='move';event.currentTarget.style.opacity='0.4'" ondragend="event.currentTarget.style.opacity='1'" onclick="openEdit('${a.id}')"><span style="color:${PAY_COLOR[a.paymentMethod]};font-weight:700;">${a.reservationTime||''}</span> ${a.customerName||''}</div>`;});
    html+=`</div>`;
  });
  html+=`</div>`;
  document.getElementById('cal-wrap').innerHTML='<div style="flex:1;display:flex;flex-direction:column;overflow:auto;">'+html+'</div>';
}

// ── 타임라인 공통 렌더 ────────────────────────────────────────
function renderTimeline(days){
  // 시간 컬럼 HTML
  let timeCol='<div class="tl-time-col" style="padding-top:46px;">';
  for(let s=0;s<TL_TOTAL_SLOTS;s++){
    const totalMin=s*30+TL_START*60, h=Math.floor(totalMin/60), m=totalMin%60;
    if(m===0) timeCol+=`<div class="tl-time-slot">${String(h).padStart(2,'0')}:00</div>`;
    else timeCol+=`<div class="tl-time-slot half"></div>`;
  }
  timeCol+='</div>';

  // 각 날짜 컬럼
  let dayCols='';
  days.forEach((d,i)=>{
    const dStr=ds(d), isT=dStr===todayStr();
    const da=apts.filter(a=>a.date===dStr).sort((a,b)=>a.reservationTime.localeCompare(b.reservationTime));
    const dow=d.getDay();
    // 헤더
    const hdrColor=isT?'var(--accent)':'transparent';
    const txtColor=isT?'#fff':dow===0?'#f87171':dow===6?'#60a5fa':'var(--text)';
    dayCols+=`<div class="tl-day-col" style="border-right:${i<days.length-1?'1px solid var(--border)':'none'};">
      <div class="tl-day-hdr">
        <div style="font-size:10px;color:${dow===0?'#f87171':dow===6?'#60a5fa':'var(--text3)'};">${WEEK_SUN[dow]}</div>
        <div style="width:26px;height:26px;border-radius:50%;background:${hdrColor};color:${txtColor};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:${isT?700:500};margin-top:2px;">${d.getDate()}</div>
      </div>
      <div class="tl-day-body" style="height:${TL_BODY_H}px;position:relative;background:${isT?'rgba(229,62,62,0.02)':'var(--bg)'};">`;

    // 슬롯 클릭 영역
    for(let s=0;s<TL_TOTAL_SLOTS;s++){
      const t=timeToSlotClick(s);
      const isBorder=s%2===0;
      dayCols+=`<div class="tl-slot${isBorder?' hour-border':''}" style="top:${s*SLOT_H}px;position:absolute;left:0;right:0;" onclick="openAdd('${dStr}','${t}')"
        ondragover="event.preventDefault();event.stopPropagation();document.querySelectorAll('.tl-slot-hl').forEach(x=>x.classList.remove('tl-slot-hl'));this.classList.add('tl-slot-hl')"
        ondragleave="this.classList.remove('tl-slot-hl')"
        ondrop="this.classList.remove('tl-slot-hl');handleDropTl(event,'${dStr}','${t}')"></div>`;
    }

    // 예약 블록
    da.forEach(a=>{
      const y=timeToY(a.reservationTime);
      const h=APT_DURATION*2*SLOT_H; // 2시간 = 4슬롯 = 120px
      const name=(a.customerName||'').length>6?(a.customerName||'').slice(0,6)+'…':(a.customerName||'');
      dayCols+=`<div class="tl-apt" draggable="true"
        style="top:${y}px;height:${h}px;background:${PAY_DIM[a.paymentMethod]};border-left:3px solid ${PAY_COLOR[a.paymentMethod]};"
        ondragstart="dragId='${a.id}';event.dataTransfer.effectAllowed='move';event.currentTarget.style.opacity='0.4'"
        ondragend="event.currentTarget.style.opacity='1'"
        onclick="openEdit('${a.id}')">
        <div style="font-size:10px;font-weight:700;color:${PAY_COLOR[a.paymentMethod]};">${a.reservationTime||''}</div>
        <div style="font-size:11px;font-weight:600;color:var(--text);margin-top:1px;">${name}</div>
        <div style="font-size:9px;color:var(--text2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${a.carType||''}</div>
        <div style="font-size:9px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${(a.workDetails||'').length>12?(a.workDetails||'').slice(0,12)+'…':(a.workDetails||'')}</div>
        <div style="font-size:10px;font-weight:600;color:${PAY_COLOR[a.paymentMethod]};margin-top:2px;">₩${fmt(a.amount)}</div>
        ${a.phone?`<div style="font-size:9px;color:var(--text2);margin-top:1px;">${a.phone}</div>`:''}
      </div>`;
    });

    dayCols+=`</div></div>`;
  });

  const wrap=`<div id="tl-view"><div class="tl-wrap" style="min-width:${52+days.length*80}px;">${timeCol}<div class="tl-days">${dayCols}</div></div></div>`;
  document.getElementById('cal-wrap').innerHTML=wrap;

  // 드래그 드롭 타임라인용
  document.querySelectorAll('.tl-day-col').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{
      e.preventDefault();col.classList.remove('drag-over');
      if(!dragId)return;
      const dStr=col.querySelector('.tl-day-hdr').dataset.date;
    });
  });
}

function renderWeek(){renderTimeline(weekDays(curDate));}
function renderDay(){renderTimeline([curDate]);}

function handleDrop(e,newDate){e.preventDefault();e.currentTarget.classList.remove('drag-over');if(!dragId)return;const a=apts.find(x=>x.id===dragId);if(!a||a.date===newDate)return;db.collection('appointments').doc(dragId).update({date:newDate,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(console.error);dragId=null;}
function handleDropTl(e,newDate,newTime){
  e.preventDefault();e.stopPropagation();
  if(!dragId)return;
  const a=apts.find(x=>x.id===dragId);
  if(!a)return;
  const upd={date:newDate,reservationTime:newTime,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
  db.collection('appointments').doc(dragId).update(upd).catch(console.error);
  dragId=null;
}

function render(){document.getElementById('header-label').textContent=headerLabel();renderSidebar();if(calView==='월간')renderMonth();else if(calView==='주간')renderWeek();else renderDay();}

// 모달
function openAdd(dateStr,timeStr){
  editId=null;delConfirm=false;clearForm();
  document.getElementById('f-date').value=dateStr||'';
  if(timeStr) document.getElementById('f-time').value=timeStr;
  document.getElementById('modal-title').textContent='새 예약 등록';
  document.getElementById('modal-date').textContent=(dateStr||'').replace(/-/g,'.');
  document.getElementById('del-btn').style.display='none';
  document.getElementById('save-btn').textContent='예약 등록';
  renderWorkTags();
  document.getElementById('modal-overlay').style.display='flex';
}
function openEdit(id){
  const a=apts.find(x=>x.id===id);if(!a)return;
  editId=id;delConfirm=false;
  document.getElementById('f-name').value=a.customerName||'';
  document.getElementById('f-phone').value=a.phone||'';
  document.getElementById('f-res').value=a.residence||'';
  document.getElementById('f-date').value=a.date||'';
  document.getElementById('f-time').value=a.reservationTime||'';
  document.getElementById('f-car').value=a.carType||'';
  document.getElementById('f-plate').value=a.licensePlate||'';
  document.getElementById('f-amt').value=a.amount||'';
  selectPay(a.paymentMethod||'카드');
  setWorkDetails(a.workDetails||'');renderWorkTags();
  document.getElementById('modal-title').textContent='예약 수정';
  document.getElementById('modal-date').textContent=(a.date||'').replace(/-/g,'.');
  document.getElementById('del-btn').style.display='';
  document.getElementById('save-btn').textContent='수정 저장';
  document.getElementById('form-err').style.display='none';
  document.getElementById('modal-overlay').style.display='flex';
}
function closeModal(){document.getElementById('modal-overlay').style.display='none';}
function clearForm(){
  ['f-name','f-phone','f-res','f-date','f-time','f-car','f-plate','f-amt'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-work-new').value='';
  selectedWorkTags=[];selectPay('카드');document.getElementById('form-err').style.display='none';
}
function selectPay(m){selectedPay=m;['카드','이체','현금'].forEach(p=>{const btn=document.getElementById('pay-'+p);if(btn){btn.style.borderColor=p===m?PAY_COLOR[p]:'var(--border)';btn.style.background=p===m?PAY_DIM[p]:'var(--bg3)';btn.style.color=p===m?PAY_COLOR[p]:'var(--text2)';}});}
async function handleSave(){
  const name=document.getElementById('f-name').value.trim(),date=document.getElementById('f-date').value;
  if(!name){showErr('고객명을 입력해주세요.');return;}
  if(!date){showErr('예약 날짜를 선택해주세요.');return;}
  document.getElementById('save-btn').textContent='저장 중...';setSyncStatus('syncing');
  try{
    const data={customerName:name,phone:document.getElementById('f-phone').value,reservationTime:document.getElementById('f-time').value,carType:document.getElementById('f-car').value,licensePlate:document.getElementById('f-plate').value,workDetails:getWorkDetails(),residence:document.getElementById('f-res').value,amount:document.getElementById('f-amt').value,paymentMethod:selectedPay,date:date,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
    if(editId)await db.collection('appointments').doc(editId).update(data);
    else{data.createdAt=firebase.firestore.FieldValue.serverTimestamp();await db.collection('appointments').add(data);}
    addSugg('carTypes',data.carType);closeModal();
  }catch(e){showErr('저장 실패');setSyncStatus('offline');}
  document.getElementById('save-btn').textContent=editId?'수정 저장':'예약 등록';
}
async function handleDelete(){const btn=document.getElementById('del-btn');if(!delConfirm){delConfirm=true;btn.textContent='정말 삭제?';btn.style.background='var(--red)';btn.style.color='#fff';return;}try{await db.collection('appointments').doc(editId).delete();closeModal();}catch(e){showErr('삭제 실패');}}
function showErr(msg){const el=document.getElementById('form-err');el.textContent=msg;el.style.display='block';}
function showSugg(type,val){const items=sugg.carTypes||[];const filtered=items.filter(s=>!val||s.toLowerCase().includes(val.toLowerCase()));const el=document.getElementById('sugg-car');if(!filtered.length){el.style.display='none';return;}el.innerHTML=filtered.map(s=>`<div class="sugg-item" onmousedown="document.getElementById('f-car').value='${s.replace(/'/g,"\'")}';document.getElementById('sugg-car').style.display='none'">${s}</div>`).join('');el.style.display='block';}
function hideSugg(){document.getElementById('sugg-car').style.display='none';}
function addSugg(field,val){if(!val?.trim())return;const list=sugg.carTypes||[];if(!list.includes(val.trim())){const ns={...sugg,carTypes:[...list,val.trim()]};sugg=ns;db.collection('settings').doc('suggestions').set(ns).catch(()=>{});}}

// 작업 태그
function getWorkItems(){return(sugg.workItems&&sugg.workItems.length)?sugg.workItems:[...DEFAULT_WORK_ITEMS];}
function renderWorkTags(){
  const items=getWorkItems();const c=document.getElementById('work-tags');if(!c)return;
  c.innerHTML=items.map(item=>{const sel=selectedWorkTags.includes(item);const safe=item.replace(/'/g,"\\'");return`<button class="work-tag${sel?' sel':''}" onclick="toggleWorkTag('${safe}')">${item}</button>`;}).join('');
  const prev=document.getElementById('work-preview');if(prev)prev.textContent=selectedWorkTags.length?selectedWorkTags.join(', '):'없음';
}
function toggleWorkTag(item){const idx=selectedWorkTags.indexOf(item);if(idx>=0)selectedWorkTags.splice(idx,1);else selectedWorkTags.push(item);renderWorkTags();}
function addWorkTag(){const input=document.getElementById('f-work-new');const val=input.value.trim();if(!val)return;const items=getWorkItems();if(!items.includes(val)){const ni=[...items,val];const ns={...sugg,workItems:ni};sugg=ns;db.collection('settings').doc('suggestions').set(ns).catch(()=>{});}if(!selectedWorkTags.includes(val))selectedWorkTags.push(val);input.value='';renderWorkTags();}
function getWorkDetails(){return selectedWorkTags.join(', ');}
function setWorkDetails(val){selectedWorkTags=val?val.split(',').map(s=>s.trim()).filter(Boolean):[];}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(() => console.log('SW registered'))
      .catch(e => console.log('SW error:', e));
  });
}
</script>
